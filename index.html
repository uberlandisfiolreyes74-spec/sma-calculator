<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMA-03</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-black text-white">

<div class="max-w-xl mx-auto p-6 space-y-6">

<h1 class="text-2xl font-bold text-center">
Análisis de Decisión SMA-03
</h1>

<input id="nombre" placeholder="Tu nombre" class="w-full p-2 text-black rounded">

<label>Presión externa</label>
<input id="p" type="range" min="0" max="1" step="0.1" value="0.5">

<label>Compromiso</label>
<input id="a" type="range" min="0" max="1" step="0.1" value="0.5">

<label>Causalidad</label>
<input id="c" type="range" min="1" max="5" value="3">

<label>Impacto en identidad</label>
<input id="i" type="range" min="1" max="5" value="3">

<label>Significado</label>
<input id="s" type="range" min="1" max="5" value="3">

<button onclick="calcular()" class="w-full bg-green-500 p-3 rounded">
Analizar
</button>

<div id="resultado" class="hidden bg-gray-800 p-4 rounded"></div>

<button id="btnPDF" onclick="generarPDF()" 
class="hidden w-full bg-blue-500 p-3 rounded">
Descargar PDF
</button>

</div>

<script>

function sigmoid(x){
    return 1 / (1 + Math.exp(-x));
}

function calcular(){

    let P = parseFloat(document.getElementById("p").value);
    let A = parseFloat(document.getElementById("a").value);
    let C = parseFloat(document.getElementById("c").value) / 5;
    let I = parseFloat(document.getElementById("i").value) / 5;
    let S = parseFloat(document.getElementById("s").value) / 5;

    let score = (P + A + C + I + S) / 5;
    let PNR = sigmoid(score * 5 - 2.5);

    let riesgo = "";
    let recomendacion = "";

    if (PNR < 0.4){
        riesgo = "Bajo";
        recomendacion = "Puedes avanzar con flexibilidad.";
    } 
    else if (PNR < 0.7){
        riesgo = "Moderado";
        recomendacion = "Mantén control y evita comprometerte demasiado.";
    } 
    else {
        riesgo = "Alto";
        recomendacion = "Reduce compromiso y busca reversibilidad.";
    }

    let resultadoHTML = `
    <h3 class="text-lg font-bold">Resultado</h3>
    <p>PNR: ${PNR.toFixed(2)}</p>
    <p>Riesgo: ${riesgo}</p>
    <p>Recomendación: ${recomendacion}</p>
    `;

    document.getElementById("resultado").innerHTML = resultadoHTML;
    document.getElementById("resultado").classList.remove("hidden");

    document.getElementById("btnPDF").classList.remove("hidden");
}

function generarPDF(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let nombre = document.getElementById("nombre").value || "Cliente";
    let contenido = document.getElementById("resultado").innerText;

    doc.setFontSize(16);
    doc.text("Informe SMA-03", 10, 15);

    doc.setFontSize(12);
    doc.text("Cliente: " + nombre, 10, 25);

    let text = doc.splitTextToSize(contenido, 180);
    doc.text(text, 10, 40);

    doc.save("Informe_SMA03.pdf");
}

</script>

</body>
</html>
